<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arduino Alert Sequence Trigger</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts for modern typography -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Connect Screen -->
  <div id="connect-screen" class="screen active">
    <div class="glass-panel">
      <h1>Alert System</h1>
      <p>Connect your Arduino over Serial to initialize the game.</p>
      <button id="connect-btn" class="glow-btn">Connect Arduino</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <div class="header">
      <div class="score-display">Score: <span id="score">0</span></div>
    </div>
    
    <div class="game-board">
      <div id="targets-wrapper">
        <div id="direction-container" class="target-box"></div>
        <div id="action-container" class="target-box"></div>
      </div>
      
      <div class="timer-bar-container">
        <div id="timer-bar"></div>
      </div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="game-over-screen" class="screen">
    <div class="glass-panel emergency">
      <h1>ALERT INITIATED</h1>
      <p>The sequence has been triggered on the Arduino.</p>
      <div style="font-size: 2rem; margin-top: 1rem;">Final Score: <span id="final-score">0</span></div>
      <button id="restart-btn" class="glow-btn" style="margin-top: 2rem;">Reset Game</button>
    </div>
  </div>

  <script src="script.js" type="module"></script>
</body>
</html>
