<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arduino Alert Sequence Trigger</title>
  <link rel="stylesheet" href="style.css?v=3" />
  <!-- Google Fonts for modern typography -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Connect Screen -->
  <div id="connect-screen" class="screen active">
    <div class="glass-panel">
      <h1>Alert System</h1>
      <p>Connect your Arduino over Serial to initialize the game.</p>
      <div style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">
        <button id="connect-btn" class="glow-btn" style="width: 250px;">Connect Arduino</button>
        <button id="skip-btn" class="glow-btn" style="border-color: #8b949e; color: #8b949e; width: 250px;">Test Locally</button>
      </div>
      <div style="font-size: 1.5rem; margin-top: 2rem; color: var(--accent); font-weight: 900;">HIGH SCORE: <span id="menu-high-score">0</span></div>
      
      <!-- Difficulty Selector -->
      <div style="margin-top: 2rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center;">
        <span style="color: #8b949e; margin-right:0.5rem; white-space: nowrap; width: 100%; margin-bottom: 0.5rem;">⇦ SELECT DIFFICULTY ⇨ </span>
        <button class="glow-btn diff-btn" data-level="easy">Easy</button>
        <button class="glow-btn diff-btn active-diff" data-level="medium">Medium</button>
        <button class="glow-btn diff-btn" data-level="hard">Hard</button>
      </div>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <div class="header">
      <div class="score-display">Score: <span id="score" style="color: var(--accent);">0</span> &nbsp;|&nbsp; Strikes: <span id="strikes" style="color: var(--danger);">0</span>/3</div>
    </div>
    
    <div class="game-board">
      <div id="game-lanes">
         <div class="lane" id="lane-joystick"><div class="target-box">🕹️</div></div>
         <div class="lane" id="lane-a"><div class="target-box">A</div></div>
         <div class="lane" id="lane-b"><div class="target-box">B</div></div>
      </div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="game-over-screen" class="screen">
    <div class="glass-panel emergency">
      <h1>ALERT INITIATED</h1>
      <p>The sequence has been triggered on the Arduino.</p>
      <div style="font-size: 2.2rem; margin-top: 1rem;">Score: <span id="final-score">0</span></div>
      <div style="font-size: 1.5rem; margin-top: 0.5rem; color: var(--accent); font-weight: 600;">Best: <span id="game-over-best">0</span></div>
      
      <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem; align-items: center; justify-content: center; flex-wrap: wrap;">
        <span style="color: #8b949e; margin-right:0.5rem; white-space: nowrap; width: 100%; margin-bottom: 0.5rem;">⇦ SELECT DIFFICULTY ⇨ </span>
        <button class="glow-btn diff-btn" data-level="easy">Easy</button>
        <button class="glow-btn diff-btn active-diff" data-level="medium">Medium</button>
        <button class="glow-btn diff-btn" data-level="hard">Hard</button>
      </div>

      <button id="restart-btn" class="glow-btn" style="margin-top: 1.5rem; width: 250px;">Reset Game</button>
    </div>
  </div>

  <script src="script.js?v=3" type="module"></script>
</body>
</html>
